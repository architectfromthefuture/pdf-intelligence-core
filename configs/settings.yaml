# Repository-root relative paths (see src/pdf_core/config.py for resolution)
paths:
  inbox: data/inbox
  markdown: data/markdown
  audit: data/audit
  chunks: data/chunks
  embeddings: data/embeddings
  vectors: data/vectors
  traces: data/traces
  graphs: data/graphs
  graph_traces: data/graphs/traces

chunk:
  max_chars: 1200
  overlap_chars: 100
  # Phase 2 indexing uses word-window chunking; see run_indexing(chunk_size=…).

embedding:
  dim: 64
  normalize: true
  # Defaults for other utilities; Phase 2 uses SentenceTransformers ("all-MiniLM-L6-v2").

retrieve:
  top_k: 8
